# Generated code (the vendored OpenAPI client) is excluded from all hooks: it has
# its own pyproject.toml, so ruff would use that config root rather than ours.
exclude: ^packages/powermap-client/

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.14
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # Static validation of deploy/ systemd units (issue #51). Assumes the VM's
  # env: verify resolves absolute ExecStart paths (/usr/local/bin/uv) and
  # User=exedev against the local box, so OFF-VM it can false-FAIL (not just
  # no-op) even with systemd-analyze present. No-ops only where systemd-analyze
  # is absent. The gate that matters runs on the single VM.
  - repo: local
    hooks:
      - id: systemd-verify-units
        name: systemd-analyze verify (deploy units)
        entry: scripts/verify-units.sh
        language: script
        files: ^deploy/.*\.(service|timer)$
