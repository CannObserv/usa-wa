# Generated code (the vendored OpenAPI client) is excluded from all hooks: it has
# its own pyproject.toml, so ruff would use that config root rather than ours.
exclude: ^packages/powermap-client/

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.14
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # Static validation of deploy/ systemd units (issue #51). No-ops where
  # systemd-analyze is absent (non-systemd contributor boxes); the gate that
  # matters runs on the single VM, which has it.
  - repo: local
    hooks:
      - id: systemd-verify-units
        name: systemd-analyze verify (deploy units)
        entry: scripts/verify-units.sh
        language: script
        files: ^deploy/.*\.(service|timer)$
