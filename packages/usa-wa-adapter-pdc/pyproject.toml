[project]
name = "usa-wa-adapter-pdc"
version = "0.1.0"
description = "WA Public Disclosure Commission (PDC) adapter — maps the SODA Campaign Finance Summary dataset to canonical House seat Assignments (District + Position). Issue #69."
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "clearinghouse-core",
    "clearinghouse-domain-legislative",
    "usa-wa-adapter-legislature",
    "httpx>=0.27,<1",
]

[tool.uv.sources]
clearinghouse-core = { workspace = true }
clearinghouse-domain-legislative = { workspace = true }
usa-wa-adapter-legislature = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/usa_wa_adapter_pdc"]
