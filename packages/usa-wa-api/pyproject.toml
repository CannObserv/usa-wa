[project]
name = "usa-wa-api"
version = "0.1.0"
description = "WA deployment of the CannObserv clearinghouse — FastAPI + MCP + REST + admin surface backed by the WA Legislature, PDC, and RCW adapters."
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "clearinghouse-core",
    "clearinghouse-domain-legislative",
    "clearinghouse-sync-powermap",
    "usa-wa-adapter-legislature",
    "fastapi>=0.115.0,<1",
    "uvicorn>=0.34.0,<1",
]

[tool.uv.sources]
clearinghouse-core = { workspace = true }
clearinghouse-domain-legislative = { workspace = true }
clearinghouse-sync-powermap = { workspace = true }
usa-wa-adapter-legislature = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/usa_wa_api"]
