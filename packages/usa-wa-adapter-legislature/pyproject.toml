[project]
name = "usa-wa-adapter-legislature"
version = "0.1.0"
description = "WA State Legislature SOAP adapter — maps WSL web services to the clearinghouse-domain-legislative canonical entities."
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "clearinghouse-core",
    "clearinghouse-domain-legislative",
    "zeep>=4.3.1",
]

[tool.uv.sources]
clearinghouse-core = { workspace = true }
clearinghouse-domain-legislative = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/usa_wa_adapter_legislature"]
