[project]
name = "clearinghouse-core"
version = "0.1.0"
description = "Jurisdiction-agnostic framework primitives for the CannObserv clearinghouse: adapter contract, provenance models, citations, ULID column type."
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "sqlalchemy[asyncio]>=2.0,<3",
    "asyncpg>=0.30.0,<1",
    "pydantic-settings>=2.5.0,<3",
    "python-json-logger>=4.0.0,<5",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/clearinghouse_core"]
