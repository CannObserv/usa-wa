[project]
name = "clearinghouse-sync-powermap"
version = "0.1.0"
description = "Portable Power Map sync engine for CannObserv sibling services: entity-descriptor contract, durable outbox, changes-feed reader, LWW reconciler. Jurisdiction- and deployment-agnostic."
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "clearinghouse-core",
    "sqlalchemy[asyncio]>=2.0,<3",
    "httpx>=0.27,<1",
]

[tool.uv.sources]
clearinghouse-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/clearinghouse_sync_powermap"]
