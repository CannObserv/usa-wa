[project]
name = "usa-wa-adapter-sos"
version = "0.1.0"
description = "WA Secretary of State adapter — bundles the SOS data sources (votewa candidate filings + results.vote.wa.gov election results) as self-contained archives, and owns the WSL+SOS House Position seat (#100/#101). Sibling of usa-wa-adapter-pdc."
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "clearinghouse-core",
    "clearinghouse-domain-legislative",
    "usa-wa-adapter-legislature",
    "usa-wa-adapter-pdc",
    "httpx>=0.27,<1",
]

[tool.uv.sources]
clearinghouse-core = { workspace = true }
clearinghouse-domain-legislative = { workspace = true }
usa-wa-adapter-legislature = { workspace = true }
usa-wa-adapter-pdc = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/usa_wa_adapter_sos"]
