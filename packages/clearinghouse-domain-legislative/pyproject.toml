[project]
name = "clearinghouse-domain-legislative"
version = "0.1.0"
description = "Legislative-government domain entities for the CannObserv clearinghouse — bills, legislators, statutes, lobbying, contributions. Jurisdiction-agnostic; reusable across state and federal deployments."
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "clearinghouse-core",
    "sqlalchemy[asyncio]>=2.0,<3",
]

[tool.uv.sources]
clearinghouse-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/clearinghouse_domain_legislative"]
