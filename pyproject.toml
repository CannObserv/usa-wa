[tool.uv.workspace]
members = ["packages/*"]

[dependency-groups]
dev = [
    # Workspace members (so a single `uv sync` installs everything in editable mode)
    "clearinghouse-core",
    "clearinghouse-domain-legislative",
    "clearinghouse-sync-powermap",
    "powermap-client",
    "usa-wa-adapter-legislature",
    "usa-wa-api",
    "usa-wa-sync-powermap",
    # Tools
    "alembic>=1.15.0,<2",
    "anyio>=4.0,<5",
    "httpx>=0.27,<1",
    "pre-commit>=4.0,<5",
    "pytest>=8.0,<9",
    "pytest-asyncio>=1.0,<2",
    "pytest-cov>=6.0,<7",
    "respx>=0.21,<1",
    "ruff>=0.9,<1",
    "vcrpy>=6.0,<7",
]

[tool.uv.sources]
clearinghouse-core = { workspace = true }
clearinghouse-domain-legislative = { workspace = true }
clearinghouse-sync-powermap = { workspace = true }
powermap-client = { workspace = true }
usa-wa-adapter-legislature = { workspace = true }
usa-wa-api = { workspace = true }
usa-wa-sync-powermap = { workspace = true }

[tool.pytest.ini_options]
testpaths = ["packages"]
addopts = "-v --tb=short -m 'not integration' --cov=packages --cov-report=term-missing"
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "session"
asyncio_default_test_loop_scope = "session"
markers = [
    "integration: marks tests that hit live external services or a real database; excluded by default (run with -m integration)",
]
filterwarnings = [
    "error::DeprecationWarning",
]

[tool.coverage.run]
source = ["packages"]
omit = ["packages/powermap-client/*"]  # generated OpenAPI client; not our code to test

[tool.coverage.report]
show_missing = true
fail_under = 80

[tool.ruff]
line-length = 100
target-version = "py312"
extend-exclude = ["skills-vendor/", "alembic/versions/", ".superpowers/", "packages/powermap-client/"]

[tool.ruff.lint]
select = ["E", "F", "I", "W", "UP"]

[tool.ruff.lint.isort]
known-first-party = [
    "clearinghouse_core",
    "clearinghouse_domain_legislative",
    "clearinghouse_sync_powermap",
    "usa_wa_adapter_legislature",
    "usa_wa_api",
    "usa_wa_sync_powermap",
]
